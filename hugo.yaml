baseURL: "https://daily.jinl.in/"
languageCode: "zh-cn"
defaultContentLanguage: "zh"
title: "Daily Hub"
theme: "PaperMod"
pagination:
  pagerSize: 20

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  description: "每日技术·财经·世界快览 — AI 精选 RSS 摘要、技术笔记、资源收藏与旅行记录"
  author: "Daily Bot"
  defaultTheme: "auto"
  ShowShareButtons: false
  ShowReadingTime: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  label:
    text: "Daily Hub"

  socialIcons:
    - name: "rss"
      url: "/index.xml"

menu:
  main:
    - identifier: "daily-news"
      name: "Daily News"
      url: "/daily-news/"
      weight: 10
    - identifier: "tech-notes"
      name: "Tech Notes"
      url: "/tech-notes/"
      weight: 20
    - identifier: "resources"
      name: "Resources"
      url: "/resources/"
      weight: 30
    - identifier: "travel-log"
      name: "Travel Log"
      url: "/travel-log/"
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
