baseURL: "https://daily.jinl.in/"
languageCode: "zh-cn"
defaultContentLanguage: "zh"
title: "技术日报"
theme: "PaperMod"
paginate: 20

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  description: "RSS 订阅源 AI 摘要日报"
  author: "Daily Bot"
  defaultTheme: "auto"
  ShowShareButtons: false
  ShowReadingTime: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: false

  homeInfoParams:
    Title: "📡 技术日报"
    Content: "每日精选 RSS 订阅源，AI 生成摘要。信息密度 > 噪音。"

  socialIcons:
    - name: "github"
      url: "https://github.com/nxajh/daily"

  label:
    text: "技术日报"

menu:
  main:
    - identifier: "archives"
      name: "归档"
      url: "/archives/"
      weight: 10
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 20
    - identifier: "search"
      name: "搜索"
      url: "/search/"
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON
