baseURL: "https://daily.jinl.in/"
languageCode: "zh-cn"
defaultContentLanguage: "zh"
title: "Daily Hub"
theme: "PaperMod"
pagination:
  pagerSize: 20

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  description: "AI 摘要日报 · 技术笔记 · 资源收藏 · 旅行杂记"
  author: "Daily Bot"
  defaultTheme: "auto"
  ShowShareButtons: false
  ShowReadingTime: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: false

  homeInfoParams:
    Title: "📡 Daily Hub"
    Content: "每日精选 RSS 摘要、技术笔记、资源收藏与旅行记录。"

  socialIcons:
    - name: "github"
      url: "https://github.com/nxajh/daily"

  label:
    text: "Daily Hub"

menu:
  main:
    - identifier: "daily-news"
      name: "Daily News"
      url: "/daily-news/"
      weight: 10
    - identifier: "tech-notes"
      name: "Tech Notes"
      url: "/tech-notes/"
      weight: 20
    - identifier: "resources"
      name: "Resources"
      url: "/resources/"
      weight: 30
    - identifier: "travel-log"
      name: "Travel Log"
      url: "/travel-log/"
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
