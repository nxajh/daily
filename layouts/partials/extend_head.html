<!-- Reading Progress Bar -->
<div class="reading-progress" id="reading-progress"></div>
<script>
// Progress bar (runs immediately, element is right above)
(function() {
  var bar = document.getElementById('reading-progress');
  if (!bar) return;
  function update() {
    var content = document.querySelector('.post-content');
    if (!content) { bar.style.width = '0%'; return; }
    var rect = content.getBoundingClientRect();
    var total = content.offsetHeight - window.innerHeight;
    var scrolled = -rect.top;
    bar.style.width = Math.min(100, Math.max(0, (scrolled / total) * 100)) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>
<script>
// Hamburger menu (deferred — body elements don't exist yet)
document.addEventListener('DOMContentLoaded', function() {
  var hamburger = document.getElementById('hamburger');
  var menu = document.getElementById('menu');
  if (!hamburger || !menu) return;
  hamburger.addEventListener('click', function(e) {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
      menu.classList.remove('open');
    }
  });
});
</script>
