<!-- Reading Progress Bar -->
<div class="reading-progress" id="reading-progress"></div>
<script>
// Progress bar (runs immediately, element is right above)
(function() {
  var bar = document.getElementById('reading-progress');
  if (!bar) return;
  function update() {
    var content = document.querySelector('.post-content');
    if (!content) { bar.style.width = '0%'; return; }
    var rect = content.getBoundingClientRect();
    var total = content.offsetHeight - window.innerHeight;
    var scrolled = -rect.top;
    bar.style.width = Math.min(100, Math.max(0, (scrolled / total) * 100)) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>
<script>
// Hamburger menu (deferred — body elements don't exist yet)
document.addEventListener('DOMContentLoaded', function() {
  var hamburger = document.getElementById('hamburger');
  var menu = document.getElementById('menu');
  if (!hamburger || !menu) return;
  hamburger.addEventListener('click', function(e) {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
      menu.classList.remove('open');
    }
  });
});
</script>
<!-- SVG Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true},{left: '$', right: '$', display: false}]});">
</script>

{{/* Structured Data for SEO */}}
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | plainify }},
  "description": {{ .Description | default .Summary | plainify | truncate 160 }},
  "url": {{ .Permalink }},
  "image": {{ printf "%s%s" .Site.BaseURL "og-default.png" }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" }},
  {{ with .Lastmod }}"dateModified": {{ .Format "2006-01-02T15:04:05Z07:00" }},{{ end }}
  "author": {
    "@type": "Organization",
    "name": {{ .Site.Params.author | default .Site.Title }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title }},
    "url": {{ .Site.BaseURL }}
  }
}
</script>
{{ else if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ .Site.Title }},
  "url": {{ .Site.BaseURL }},
  "description": {{ .Site.Params.description }},
  "inLanguage": "zh-CN"
}
</script>
{{ end }}

{{/* BreadcrumbList structured data */}}
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ .Site.BaseURL }}
    }
    {{ with .Section }}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ . | humanize | title }},
      "item": {{ printf "%s%s/" $.Site.BaseURL . }}
    }
    {{ end }}
    ,{
      "@type": "ListItem",
      "position": {{ if .Section }}3{{ else }}2{{ end }},
      "name": {{ .Title | plainify }},
      "item": {{ .Permalink }}
    }
  ]
}
</script>
{{ end }}
